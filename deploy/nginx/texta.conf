# Remplacer CRM_DOMAIN par votre domaine (ou utiliser _ pour IP seule en HTTP)
# Exemple server_name crm.texta.io;

upstream texta_web {
    server web:3000;
}

upstream texta_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Let's Encrypt challenge (activer avec certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API FastAPI — préfixe /api/v1 côté app
    location /api/ {
        proxy_pass http://texta_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://texta_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://texta_api/openapi.json;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://texta_api/health;
    }

    # Frontend Next.js
    location / {
        proxy_pass http://texta_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Décommenter après obtention du certificat SSL (voir docs/deployment-vps.md)
