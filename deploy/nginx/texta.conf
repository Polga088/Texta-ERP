# Remplacer CRM_DOMAIN par votre domaine (ou utiliser _ pour IP seule en HTTP)
# Exemple server_name crm.texta.io;

# Résolution DNS Docker dynamique — évite les 502 Bad Gateway après redéploiement
# (Nginx met en cache l'IP des conteneurs au démarrage sans ce resolver)
resolver 127.0.0.11 valid=10s ipv6=off;

upstream texta_web {
    server web:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Let's Encrypt challenge (activer avec certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API FastAPI — routes sous /api/v1
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /docs {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream/openapi.json;
        proxy_set_header Host $host;
    }

    location /health {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Frontend Next.js
    location / {
        proxy_pass http://texta_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# Décommenter après obtention du certificat SSL (voir docs/deployment-vps.md)
