# Production VPS — tout tourne sur le serveur, pas sur votre Mac
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-texta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-texta_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-texta} -d ${POSTGRES_DB:-texta_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-texta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-texta_crm}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-texta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-texta_crm}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Vide = appels API relatifs via Nginx (/api/v1) — recommandé en production
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SSR Next.js : accès direct au conteneur API sur le réseau Docker
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/texta.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  # Optionnel : décommenter après configuration du domaine pour HTTPS auto
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - certbot_www:/var/www/certbot
  #     - certbot_certs:/etc/letsencrypt
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
