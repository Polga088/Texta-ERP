name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: texta
          POSTGRES_PASSWORD: texta
          POSTGRES_DB: texta_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://texta:texta@localhost:5432/texta_crm_test
        run: alembic upgrade head

      - name: Pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://texta:texta@localhost:5432/texta_crm_test
          JWT_SECRET_KEY: test-secret
        run: pytest -v

      - name: Ruff
        working-directory: apps/api
        run: pip install ruff && ruff check src tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install & lint
        working-directory: apps/web
        run: |
          npm ci
          npm run lint

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
